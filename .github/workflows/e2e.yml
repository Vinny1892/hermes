name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    name: Unit & integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --features server

      - name: Clippy
        run: cargo clippy --features server -- -D warnings

  build:
    name: Build Hermes binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Install dx CLI
        run: curl -sSL https://dioxuslabs.com/install.sh | bash

      - name: Build release bundle (server + WASM frontend)
        run: dx build --platform web --release

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: hermes-bundle
          path: target/dx/hermes/release/web/
          retention-days: 1

  e2e:
    name: Playwright E2E
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download hermes bundle
        uses: actions/download-artifact@v8
        with:
          name: hermes-bundle
          path: target/dx/hermes/release/web

      - name: Make binary executable
        run: chmod +x target/dx/hermes/release/web/server

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: e2e/package.json

      - name: Install Node dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install chromium --with-deps

      - name: Run Playwright tests
        working-directory: e2e
        run: npx playwright test
        env:
          SKIP_BUILD: '1'

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
