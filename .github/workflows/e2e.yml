name: E2E Tests

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  build:
    name: Build Hermes binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Install dx CLI
        run: curl -sSL https://dioxuslabs.com/install.sh | sh
        shell: bash

      - name: Build release bundle (server + WASM frontend)
        run: dx build --platform web --release

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: hermes-bundle
          path: target/dx/hermes/release/web/
          retention-days: 1

  e2e:
    name: Playwright E2E
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download hermes bundle
        uses: actions/download-artifact@v4
        with:
          name: hermes-bundle
          path: target/dx/hermes/release/web

      - name: Make binary executable
        run: chmod +x target/dx/hermes/release/web/hermes

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: e2e/package.json

      - name: Install Node dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install chromium --with-deps

      - name: Run Playwright tests
        working-directory: e2e
        run: npx playwright test
        env:
          SKIP_BUILD: '1'

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
